limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

limit_req_status 429;
limit_conn_status 429;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  limit_conn conn_limit 20;

  location = /api/auth/login {
    limit_req zone=auth_limit burst=10 nodelay;
    proxy_pass http://backend:8080/auth/login;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/auth/register {
    limit_req zone=auth_limit burst=10 nodelay;
    proxy_pass http://backend:8080/auth/register;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/refresh {
    limit_req zone=auth_limit burst=10 nodelay;
    proxy_pass http://backend:8080/auth/refresh;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;
    proxy_pass http://backend:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # S3/MinIO проксируется отдельным сабдоменом на хостовом nginx
  # (s3.<домен> → MinIO напрямую, путь 1:1). Через этот контейнерный
  # nginx S3 НЕ ходит: префикс пути ломал бы SigV4-подпись presigned-URL.
  # Детали в DEPLOY.md.

  location / {
    try_files $uri $uri/ /index.html;
  }
}
