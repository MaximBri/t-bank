openapi: 3.0.3
info:
  title: T-Event API
  version: 1.0.0
  description: |
    API для событий, участников, расходов, подтверждений расходов,
    приглашений, взаиморасчетов, профиля, уведомлений и файлов.

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - cookieAccessToken: []

tags:
  - name: Auth
    description: Регистрация, вход, текущая сессия и refresh/logout
  - name: Events
    description: События, превью, токены приглашения и завершение событий
  - name: Participants
    description: Участники события и выход из события
  - name: Expenses
    description: Расходы события и подтверждение участия в расходах
  - name: Settlements
    description: Взаиморасчеты и статусы платежей
  - name: Invitations
    description: Входящие и исходящие заявки на участие
  - name: Profile
    description: Изменение профиля и пароля текущего пользователя
  - name: Notifications
    description: Уведомления пользователя
  - name: History
    description: История действий в событии
  - name: S3
    description: Presigned URL для загрузки, скачивания и удаления файлов

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Зарегистрировать пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь зарегистрирован, auth cookies установлены
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Некорректные входные данные
        '409':
          description: Пользователь уже существует

  /auth/login:
    post:
      tags: [Auth]
      summary: Войти
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход, auth cookies установлены
          headers:
            Set-Cookie:
              schema:
                type: string
        '400':
          description: Некорректные входные данные
        '401':
          description: Неверные учетные данные

  /auth/me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя
      responses:
        '200':
          description: Данные текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: Пользователь не аутентифицирован

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновить access и refresh tokens
      security:
        - cookieRefreshToken: []
      responses:
        '200':
          description: Tokens обновлены, auth cookies переустановлены
          headers:
            Set-Cookie:
              schema:
                type: string
        '401':
          description: Refresh token отсутствует или невалиден

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выйти и очистить auth cookies
      responses:
        '204':
          description: Cookies очищены

  /events:
    post:
      tags: [Events]
      summary: Создать событие
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '201':
          description: Событие создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Ошибка валидации
        '401':
          description: Пользователь не аутентифицирован

  /events/{eventId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Events]
      summary: Получить событие
      responses:
        '200':
          description: Событие
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '403':
          description: Текущий пользователь не является участником события
        '404':
          description: Событие не найдено
    patch:
      tags: [Events]
      summary: Обновить событие
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '200':
          description: Событие обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Ошибка валидации
        '403':
          description: Недостаточно прав
        '404':
          description: Событие не найдено

  /events/user/events:
    get:
      tags: [Events]
      summary: Получить события текущего пользователя
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EventStatus'
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: minParticipants
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: maxParticipants
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Список событий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsResponse'
        '400':
          description: Некорректные фильтры

  /events/preview/{token}:
    get:
      tags: [Events]
      summary: Получить публичное превью события по invite token
      security: []
      parameters:
        - $ref: '#/components/parameters/InviteToken'
      responses:
        '200':
          description: Превью события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPreviewResponse'
        '404':
          description: Token или событие не найдены
        '410':
          description: Token истек

  /events/{token}/apply:
    post:
      tags: [Events]
      summary: Подать заявку на участие по invite token
      parameters:
        - $ref: '#/components/parameters/InviteToken'
      responses:
        '204':
          description: Заявка создана или пользователь добавлен
        '401':
          description: Пользователь не аутентифицирован
        '404':
          description: Token или событие не найдены
        '409':
          description: Пользователь уже участвует или заявка уже существует
        '410':
          description: Token истек

  /events/{eventId}/participants:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Participants]
      summary: Получить участников события
      responses:
        '200':
          description: Участники события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
        '403':
          description: Текущий пользователь не является участником события
    
  /events/{eventId}/participants/{userId}:
    delete:
      tags: [Participants]
      summary: Удалить участника из события
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Участник удален
        '403':
          description: Недостаточно прав
        '404':
          description: Участник не найден

  /events/{eventId}/exit:
    delete:
      tags: [Participants]
      summary: Выйти из события
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '204':
          description: Пользователь вышел из события
        '403':
          description: Нельзя выйти из события
        '404':
          description: Событие не найдено

  /events/{eventId}/complete:
    post:
      tags: [Events]
      summary: Завершить событие
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Событие завершено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '403':
          description: Недостаточно прав
        '404':
          description: Событие не найдено

  /events/{eventId}/token:
    get:
      tags: [Events]
      summary: Получить invite token события
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Token события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTokenResponse'
        '403':
          description: Недостаточно прав
        '404':
          description: Событие не найдено

  /events/{eventId}/expenses:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Expenses]
      summary: Получить расходы события
      responses:
        '200':
          description: Расходы события и общая сумма
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventExpensesResponse'
        '403':
          description: Текущий пользователь не является участником события
    post:
      tags: [Expenses]
      summary: Создать расход
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Расход создан, возвращен id расхода
          content:
            application/json:
              schema:
                type: string
                format: uuid
        '400':
          description: Ошибка валидации
        '403':
          description: Текущий пользователь не является участником события

  /events/{eventId}/expenses/{expenseId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
      - $ref: '#/components/parameters/ExpenseId'
    patch:
      tags: [Expenses]
      summary: Обновить расход
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '204':
          description: Расход обновлен
        '400':
          description: Ошибка валидации
        '403':
          description: Недостаточно прав
        '404':
          description: Расход не найден
    delete:
      tags: [Expenses]
      summary: Удалить расход
      responses:
        '204':
          description: Расход удален
        '403':
          description: Недостаточно прав
        '404':
          description: Расход не найден

  /expenses/participant/inbox:
    get:
      tags: [Expenses]
      summary: Получить расходы, ожидающие подтверждения текущего пользователя
      responses:
        '200':
          description: Inbox расходов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInboxItemDTO'
        '401':
          description: Пользователь не аутентифицирован

  /expenses/participant/{expenseId}/confirm:
    post:
      tags: [Expenses]
      summary: Подтвердить участие в расходе
      parameters:
        - $ref: '#/components/parameters/ExpenseId'
      responses:
        '204':
          description: Расход подтвержден текущим пользователем
        '403':
          description: Текущий пользователь не участник расхода
        '404':
          description: Расход не найден

  /expenses/participant/{expenseId}/leave:
    post:
      tags: [Expenses]
      summary: Отклонить участие в расходе
      parameters:
        - $ref: '#/components/parameters/ExpenseId'
      responses:
        '204':
          description: Участие отклонено
        '403':
          description: Текущий пользователь не участник расхода
        '404':
          description: Расход не найден

  /events/{eventId}/settlements:
    get:
      tags: [Settlements]
      summary: Получить взаиморасчеты события
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Взаиморасчеты события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSettlementsResponse'
        '403':
          description: Текущий пользователь не является участником события

  /events/{eventId}/payments/{paymentId}/sent:
    post:
      tags: [Settlements]
      summary: Отметить платеж отправленным
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment status changed to SENT
        '400':
          description: Некорректный переход статуса
        '403':
          description: Недостаточно прав
        '404':
          description: Платеж не найден

  /events/{eventId}/payments/{paymentId}/fail:
    post:
      tags: [Settlements]
      summary: Отклонить отправленный платеж
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment status changed to FAILED
        '400':
          description: Некорректный переход статуса
        '403':
          description: Недостаточно прав
        '404':
          description: Платеж не найден

  /events/{eventId}/payments/{paymentId}/complete:
    post:
      tags: [Settlements]
      summary: Подтвердить получение платежа
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment status changed to COMPLETED
        '400':
          description: Некорректный переход статуса
        '403':
          description: Недостаточно прав
        '404':
          description: Платеж не найден

  /invitations/outbox:
    get:
      tags: [Invitations]
      summary: Получить исходящие заявки текущего пользователя
      responses:
        '200':
          description: Исходящие заявки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyInvitationResponse'

  /invitations/inbox:
    get:
      tags: [Invitations]
      summary: Получить входящие заявки владельца событий
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Входящие заявки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OwnerInvitationResponse'

  /invitations/{invitationId}/decide:
    patch:
      tags: [Invitations]
      summary: Принять или отклонить заявку
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationDecisionRequest'
      responses:
        '204':
          description: Решение применено
        '400':
          description: Некорректный статус
        '403':
          description: Недостаточно прав
        '404':
          description: Заявка не найдена

  /me:
    patch:
      tags: [Profile]
      summary: Обновить профиль текущего пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Профиль обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '400':
          description: Ошибка валидации
        '401':
          description: Пользователь не аутентифицирован
        '409':
          description: Логин уже занят

  /me/password:
    post:
      tags: [Profile]
      summary: Изменить пароль текущего пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: Пароль обновлен
        '400':
          description: Ошибка валидации или неверный текущий пароль
        '401':
          description: Пользователь не аутентифицирован

  /notifications:
    get:
      tags: [Notifications]
      summary: Получить уведомления текущего пользователя
      responses:
        '200':
          description: Уведомления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Получить количество непрочитанных уведомлений
      responses:
        '200':
          description: Количество непрочитанных уведомлений
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 3

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Отметить уведомление прочитанным
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Уведомление прочитано
        '404':
          description: Уведомление не найдено

  /events/{eventId}/history:
    get:
      tags: [History]
      summary: Получить историю события
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: История события
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventHistoryResponse'
        '403':
          description: Текущий пользователь не является участником события

  /s3/upload:
    post:
      tags: [S3]
      summary: Получить presigned URL для загрузки изображения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageUploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Некорректный запрос
        '401':
          description: Пользователь не аутентифицирован

  /s3/download:
    get:
      tags: [S3]
      summary: Получить presigned URL для скачивания изображения
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlResponse'
        '401':
          description: Пользователь не аутентифицирован
        '404':
          description: Файл не найден

  /s3/delete:
    delete:
      tags: [S3]
      summary: Удалить файл по ключу
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Файл удален
        '401':
          description: Пользователь не аутентифицирован

components:
  securitySchemes:
    cookieAccessToken:
      type: apiKey
      in: cookie
      name: accessToken
    cookieRefreshToken:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string

  schemas:
    RegisterRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          maxLength: 255
          example: maxim
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 255
          example: strongPassword123
        first_name:
          type: string
          nullable: true
          example: Максим
        second_name:
          type: string
          nullable: true
          example: Иванов
        invite_token:
          type: string
          nullable: true
          example: abcd1234

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          maxLength: 255
          example: maxim
        password:
          type: string
          format: password
          maxLength: 255
          example: strongPassword123
        invite_token:
          type: string
          nullable: true
          example: abcd1234

    RegisterResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        joined_group_id:
          type: string
          format: uuid
          nullable: true

    CurrentUserResponse:
      type: object
      properties:
        login:
          type: string
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
          nullable: true
        second_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true

    EventRequest:
      type: object
      required: [title, startDate, endDate]
      properties:
        title:
          type: string
          example: Поездка в Казань
        description:
          type: string
          nullable: true
          maxLength: 1000
        startDate:
          type: string
          format: date-time
          example: '2026-06-10T12:00:00'
        endDate:
          type: string
          format: date-time
          example: '2026-06-12T18:00:00'
        image_key:
          type: string
          nullable: true
          description: Также принимаются alias `imageUrl` и `image_url`.
        category:
          type: array
          nullable: true
          description: Также принимается alias `categories`.
          items:
            type: string
          example: [travel, food]

    EventStatus:
      type: string
      enum: [PLANNED, ACTIVE, COMPLETED]

    CreatorInfo:
      type: object
      properties:
        firstName:
          type: string
        secondName:
          type: string
        login:
          type: string
        avatarUrl:
          type: string
          nullable: true

    EventResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        categories:
          type: array
          items:
            type: string
        status:
