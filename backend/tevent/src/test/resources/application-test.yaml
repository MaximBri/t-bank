spring:
  datasource:
    url: jdbc:h2:mem:tevent;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

app:
  security:
    jwt:
      secret: tevent-test-jwt-secret-for-auth-tests
      access-token-expiration-minutes: 15
      refresh-token-expiration-days: 30
      cookie-secure: false
