spring:
  application:
    name: tevent
  datasource:
    url: jdbc:postgresql://localhost:5432/tbank
    username: tbank
    password: tbank
    driver-class-name: org.postgresql.Driver
#  jpa:
#    hibernate:
#      ddl-auto: validate
#  logging:
#    level:
#      org.hibernate.orm.model.naming: DEBUG
#      org.hibernate.orm.results: DEBUG

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  docker:
    compose:
      enabled: false
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-minutes: 15
      refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
      cookie-secure: ${JWT_COOKIE_SECURE:false}
