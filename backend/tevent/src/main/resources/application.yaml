spring:
  application:
    name: tevent

  datasource:
    url: jdbc:postgresql://localhost:5432/tbank
    username: tbank
    password: tbank
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  docker:
    compose:
      enabled: false

  cloud:
    aws:
      s3:
        endpoint: ${SPRING_CLOUD_AWS_S3_ENDPOINT:http://localhost:9000}
        bucket-name: ${SPRING_CLOUD_AWS_S3_BUCKET_NAME:tbank-receipts}
        path-style-access-enabled: true
      credentials:
        access-key: ${SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY:minioadmin}
        secret-key: ${SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY:minioadmin123}
      region:
        static: ${SPRING_CLOUD_AWS_REGION_STATIC:us-east-1}

springdoc:
  swagger-ui:
    url: ${SPRINGDOC_SWAGGER_UI_URL:/v3/api-docs}
    config-url: ${SPRINGDOC_SWAGGER_UI_CONFIG_URL:/v3/api-docs/swagger-config}

app:
  s3:
    presign-ttl-minutes: 15
    pending-ttl-hours: 1
    cleanup-batch-size: 100
    max-file-size-bytes: 3145728
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-minutes: 15
      refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
      cookie-secure: ${JWT_COOKIE_SECURE:false}
