name: API Tests

concurrency:
  group: api-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, test, 'test/*', 'chore/test-*']
    paths:
      - 'backend/tevent/**'
      - 'frontend/tests/api/**'
      - 'frontend/playwright.api.config.ts'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'backend/tevent/**'
      - 'frontend/tests/api/**'
      - 'frontend/playwright.api.config.ts'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/api.yml'
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: my_database
        options: >-
          --health-cmd "pg_isready -U user -d my_database"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Start backend
        working-directory: backend/tevent
        env:
          JWT_SECRET: ci-secret-ci-secret-ci-secret-32-chars
          JWT_COOKIE_SECURE: false
          SPRING_DOCKER_COMPOSE_ENABLED: false
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/my_database?sslmode=disable
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password
        run: |
          ./mvnw spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/v3/api-docs > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat backend/tevent/backend.log
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run API tests
        working-directory: frontend
        run: npm run test:api

      - name: Upload Playwright API report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: frontend/.artifacts/api/playwright-report
          retention-days: 30

      - name: Upload backend log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-log-api
          path: backend/tevent/backend.log
          retention-days: 7
