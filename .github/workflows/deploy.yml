name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        env:
          REPO: ${{ github.repository }}
        run: |
          IMAGE_NAMESPACE="$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')"
          echo "image_namespace=${IMAGE_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      SPRING_DATA_REDIS_HOST: ${{ secrets.SPRING_DATA_REDIS_HOST }}
      SPRING_DATA_REDIS_PORT: ${{ secrets.SPRING_DATA_REDIS_PORT }}
      FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
      BACKEND_PORT: ${{ secrets.BACKEND_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy settings
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          test -n "$SSH_USER"
          test -n "$DEPLOY_PATH"
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"
          test -n "$SPRING_DATASOURCE_URL"
          test -n "$SPRING_DATASOURCE_USERNAME"
          test -n "$SPRING_DATASOURCE_PASSWORD"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload deploy files
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az \
            -e "ssh -p $SSH_PORT" \
            docker-compose.prod.yml \
            scripts/deploy.sh \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Write remote env and deploy
        env:
          IMAGE_NAMESPACE: ${{ needs.build-and-push.outputs.image_namespace }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            cd '$DEPLOY_PATH' && \
            { \
              echo 'IMAGE_REGISTRY=${{ env.REGISTRY }}'; \
              echo 'IMAGE_NAMESPACE=${IMAGE_NAMESPACE}'; \
              echo 'IMAGE_TAG=${IMAGE_TAG}'; \
              echo 'GHCR_USERNAME=${GHCR_USERNAME}'; \
              echo 'GHCR_TOKEN=${GHCR_TOKEN}'; \
              echo 'SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}'; \
              echo 'SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}'; \
              echo 'SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}'; \
              echo 'SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis}'; \
              echo 'SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}'; \
              echo 'FRONTEND_PORT=${FRONTEND_PORT:-3001}'; \
              echo 'BACKEND_PORT=${BACKEND_PORT:-8080}'; \
              echo 'POSTGRES_DB=tbank'; \
              echo 'POSTGRES_USER=tbank'; \
              echo 'POSTGRES_PASSWORD=tbank'; \
            } > .env && \
            bash ./deploy.sh
          "
