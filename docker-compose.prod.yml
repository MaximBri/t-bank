services:
  frontend:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/frontend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

  backend:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/backend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      SPRINGDOC_SWAGGER_UI_URL: ${SPRINGDOC_SWAGGER_UI_URL:-/api/v3/api-docs}
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: ${SPRINGDOC_SWAGGER_UI_CONFIG_URL:-/api/v3/api-docs/swagger-config}
      SPRING_CLOUD_AWS_S3_ENDPOINT: ${SPRING_CLOUD_AWS_S3_ENDPOINT}
      SPRING_CLOUD_AWS_S3_BUCKET_NAME: ${SPRING_CLOUD_AWS_S3_BUCKET_NAME:-tbank-receipts}
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${MINIO_ROOT_USER}
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SPRING_CLOUD_AWS_REGION_STATIC: ${SPRING_CLOUD_AWS_REGION_STATIC:-us-east-1}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tbank}
      POSTGRES_USER: ${POSTGRES_USER:-tbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tbank}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      # Bound to host loopback only: the host nginx terminates TLS for
      # s3.t-event.front-craft.ru and proxies here. Not exposed publicly.
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${SPRING_CLOUD_AWS_S3_BUCKET_NAME:-tbank-receipts} --ignore-existing;
      echo 'Bucket created';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      SPRING_CLOUD_AWS_S3_BUCKET_NAME: ${SPRING_CLOUD_AWS_S3_BUCKET_NAME:-tbank-receipts}

volumes:
  postgres_data:
  redis_data:
  minio_data:
