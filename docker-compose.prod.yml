services:
  frontend:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/frontend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

  backend:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/backend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tbank}
      POSTGRES_USER: ${POSTGRES_USER:-tbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tbank}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
